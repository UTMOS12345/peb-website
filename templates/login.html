<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login — PEB Union</title>
        <meta name="description" content="Admin login for the PEB Union newsroom." />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/styles.css') }}"
        />

        <style>
            .login-wrap {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg-tint);
                padding: 40px 20px;
            }
            .login-card {
                width: 100%;
                max-width: 440px;
                background: var(--bg);
                border: 1px solid var(--line);
                border-radius: var(--r-lg);
                padding: 48px 44px;
                box-shadow: var(--shadow);
            }
            .login-logo {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 36px;
                text-decoration: none;
            }
            .login-logo svg {
                width: 36px;
                height: 36px;
                color: var(--navy);
                flex-shrink: 0;
            }
            .login-logo-text {
                display: flex;
                flex-direction: column;
                gap: 1px;
            }
            .login-logo-text .name {
                font-family: var(--serif);
                font-size: 16px;
                font-weight: 600;
                color: var(--navy);
                line-height: 1.1;
            }
            .login-logo-text .tag {
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--muted);
            }
            .login-heading {
                font-family: var(--serif);
                font-size: 26px;
                font-weight: 500;
                color: var(--navy);
                margin: 0 0 6px;
                letter-spacing: -0.02em;
            }
            .login-sub {
                font-size: 14px;
                color: var(--muted);
                margin: 0 0 32px;
            }
            .flash-error {
                background: #fef2f2;
                color: #991b1b;
                border: 1px solid #fecaca;
                border-radius: var(--r-sm);
                padding: 12px 14px;
                font-size: 14px;
                margin-bottom: 24px;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .flash-error::before {
                content: "⚠";
                font-size: 13px;
                flex-shrink: 0;
            }
            .login-submit {
                width: 100%;
                margin-top: 8px;
            }
            .login-footer {
                margin-top: 24px;
                text-align: center;
                font-size: 13px;
                color: var(--muted);
            }
            .login-footer a {
                color: var(--blue);
                font-weight: 500;
            }
            .login-footer a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>

        <div class="login-wrap">
            <div class="login-card">

                <!-- Logo -->
                <a href="/" class="login-logo" aria-label="PEB Union home">
                    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="19" fill="none" stroke="currentColor" stroke-width="1.5" />
                        <text
                            x="20" y="26"
                            text-anchor="middle"
                            font-family="Fraunces, serif"
                            font-weight="700"
                            font-size="16"
                            fill="currentColor"
                        >P</text>
                    </svg>
                    <div class="login-logo-text">
                        <span class="name">PEB Union</span>
                        <span class="tag">Newsroom Admin</span>
                    </div>
                </a>

                <h1 class="login-heading">Welcome back</h1>
                <p class="login-sub">Sign in to access the editorial panel.</p>

                <!-- Flash Messages -->
                {% for message in get_flashed_messages() %}
                <div class="flash-error" role="alert">{{ message }}</div>
                {% endfor %}

                <!-- Login Form -->
                <form method="POST" action="/login" novalidate>
                    <div class="form-row">
                        <label for="username">Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Enter your username"
                            autocomplete="username"
                            required
                        />
                    </div>

                    <div class="form-row">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                        />
                    </div>

                    <button type="submit" class="btn login-submit">
                        Sign in →
                    </button>
                </form>

                <div class="login-footer">
                    <a href="/">← Back to PEB Union</a>
                </div>

            </div>
        </div>

        <script src="{{ url_for('static', filename='js/layout.js') }}"></script>
    </body>
</html>
