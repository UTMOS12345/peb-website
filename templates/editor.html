<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Editor — PEB Union</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    </head>
    <body style="background: var(--bg-tint);">

        <header class="navbar" id="navbar">
            <div class="nav-inner">
                <a href="/" class="brand">
                    <span class="brand-name">PEB Engine</span>
                </a>
                <div style="display:flex; gap:12px; align-items:center;">
                    <span class="status-pill status-pill--{{ post.status if post is defined else 'draft' }}">
                        {{ post.status | capitalize if post is defined else 'New Draft' }}
                    </span>
                    <a href="/admin/manage" class="btn btn--ghost" style="padding: 8px 16px; font-size: 13px;">← Dashboard</a>
                </div>
            </div>
        </header>

        <main style="padding: 32px 0 120px;">
            <form method="POST" action="{{ url_for('editor_save') if post is not defined else url_for('editor_update', id=post.id) }}">

                <div class="editor-layout">
                    <!-- Markdown Workspace -->
                    <div class="editor-main">
                        <div class="editor-toolbar">
                            <span style="font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-weight: 700;">Markdown Editor</span>
                            <div style="display:flex; gap:6px;">
                                <button type="button" class="toolbar-btn" onclick="insertMd('**', '**')" title="Bold">B</button>
                                <button type="button" class="toolbar-btn" style="font-style:italic;" onclick="insertMd('*', '*')" title="Italic">I</button>
                                <button type="button" class="toolbar-btn" onclick="insertMd('\n## ', '')" title="Heading">H2</button>
                                <button type="button" class="toolbar-btn" onclick="insertMd('\n- ', '')" title="List">•</button>
                            </div>
                        </div>
                        <textarea
                            name="content_raw"
                            id="contentRaw"
                            class="editor-textarea"
                            placeholder="Start writing in Markdown...
# Use headers for Articles
Use simple text for News updates.
Interviews can include a transcript here."
                            required
                        >{{ post.content_raw if post is defined else '' }}</textarea>
                    </div>

                    <!-- Sidebar -->
                    <aside class="editor-sidebar">
                        <div class="sidebar-section">
                            <h4 class="sidebar-heading">Post Configuration</h4>

                            <div class="form-row">
                                <label>Title / Headline</label>
                                <input type="text" name="title" value="{{ post.title if post is defined else '' }}" placeholder="Enter title..." required />
                            </div>

                            <div class="form-row">
                                <label>Content Type</label>
                                <select name="post_type">
                                    <option value="news" {{ 'selected' if post is defined and post.post_type == 'news' else '' }}>News Update</option>
                                    <option value="article" {{ 'selected' if post is defined and post.post_type == 'article' else '' }}>Long-form Article</option>
                                    <option value="interview" {{ 'selected' if post is defined and post.post_type == 'interview' else '' }}>Interview / Podcast</option>
                                </select>
                            </div>

                            <div class="form-row">
                                <label>Academic Desk (Category)</label>
                                <select name="category">
                                    <option value="politics" {{ 'selected' if post is defined and post.category == 'politics' else '' }}>Politics</option>
                                    <option value="economics" {{ 'selected' if post is defined and post.category == 'economics' else '' }}>Economics</option>
                                    <option value="business" {{ 'selected' if post is defined and post.category == 'business' else '' }}>Business</option>
                                    <option value="general" {{ 'selected' if post is defined and post.category == 'general' else '' }}>General / Meta</option>
                                </select>
                            </div>

                            <div class="form-row">
                                <label>Summary (Card Excerpt)</label>
                                <textarea name="summary" style="min-height: 80px;" placeholder="Brief summary for the card view...">{{ post.summary if post is defined else '' }}</textarea>
                            </div>

                            <div class="form-row">
                                <label>YouTube Link (Podcast/Video)</label>
                                <input
                                    type="url"
                                    name="video_url"
                                    placeholder="https://youtube.com/watch?v=..."
                                    value="{{ post.video_url if post is defined else '' }}"
                                />
                                <p style="font-size:10px; color:var(--muted); margin-top:4px;">Paste any YouTube link. The system cleans it for the player.</p>
                            </div>

                            <div class="form-row">
                                <label>Cover Image URL</label>
                                <input type="url" name="image_url" placeholder="https://..." value="{{ post.image_url if post is defined else '' }}" />
                            </div>
                        </div>
                    </aside>
                </div>

                <!-- Sticky Bottom Bar -->
                <div class="admin-actions">
                    <div class="admin-actions-inner">
                        <div style="display:flex; gap:10px;">
                            {% if current_user.role == 'researcher' %}
                                <button type="submit" name="action" value="draft" class="btn btn--ghost">Save Draft</button>
                                <button type="submit" name="action" value="pending" class="btn" style="background:var(--blue); border-color:var(--blue);">Submit for Review →</button>
                            {% else %}
                                <button type="submit" name="action" value="draft" class="btn btn--ghost">Save Draft</button>
                                <button type="submit" name="action" value="published" class="btn" style="background:#16a34a; border-color:#16a34a;">✓ Publish to Website</button>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </form>
        </main>

        <script>
            function insertMd(before, after) {
                const area = document.getElementById('contentRaw');
                const start = area.selectionStart;
                const end = area.selectionEnd;
                const text = area.value;
                const beforeText = text.substring(0, start);
                const afterText = text.substring(end);
                const selection = text.substring(start, end);

                area.value = beforeText + before + selection + after + afterText;
                area.focus();
                area.selectionStart = start + before.length;
                area.selectionEnd = start + before.length + selection.length;
            }
        </script>
    </body>
</html>
